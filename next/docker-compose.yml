services:
  app:
    container_name: armanstudio-blog
    image: ghcr.io/${GITHUB_REPOSITORY:-erfanweb/erfanweb}:latest
    ports:
      - "4000:4000"
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 3
