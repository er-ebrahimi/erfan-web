# Production stack — fresh server, SQLite. Edit domains in Caddyfile + build args below.
name: erfan-web

services:
  strapi:
    build:
      context: ../strapi
      dockerfile: Dockerfile.prod
    image: strapi-erfanweb:latest
    restart: unless-stopped
    env_file: ./strapi.env
    volumes:
      - strapi-data:/opt/app/.tmp
      - strapi-uploads:/opt/app/public/uploads
    networks: [internal]

  web:
    build:
      context: ../next
      dockerfile: Dockerfile
      args:
        # CHANGE to your CMS URL. NEXT_PUBLIC_* + DOMAIN are baked in at build time.
        NEXT_PUBLIC_API_URL: "https://cms.aiunpacked.ir"
        NEXT_PUBLIC_STRAPI_URL: "https://cms.aiunpacked.ir"
        DOMAIN: "cms.aiunpacked.ir"
        BACK_PORT: ""
    image: armanstudio-blog:latest
    restart: unless-stopped
    env_file: ./web.env
    depends_on: [strapi]
    networks: [internal]

  caddy:                          # reverse proxy + automatic HTTPS (Let's Encrypt)
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [web, strapi]
    networks: [internal]

networks:
  internal:

volumes:
  strapi-data:
  strapi-uploads:
  caddy-data:
  caddy-config:
